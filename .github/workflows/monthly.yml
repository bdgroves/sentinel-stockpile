name: Monthly Stockpile Monitor

on:
  schedule:
    # Run on the 1st and 15th of each month
    - cron: '0 6 1,15 * *'
  workflow_dispatch:
    inputs:
      site:
        description: 'Site ID to monitor'
        required: true
        default: 'longview_port'

jobs:
  monitor:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: [longview_port, tacoma_port, weyerhaeuser_longview]

    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.40.0

      - name: Run pipeline
        run: pixi run pipeline --site ${{ matrix.site }} --months 1

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "📊 Monthly update: ${{ matrix.site }} $(date +%Y-%m-%d)"
          git push
